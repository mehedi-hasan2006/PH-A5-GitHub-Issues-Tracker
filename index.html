<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker ||Sign in to manage your issues </title>


    <!-- Tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />


    <!-- Geist  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    

</head>

<body class="bg-[#F8FAFC]">

    <section class="min-h-screen max-w-md mx-auto pt-5">

        <div class="mx-auto w-11/12 pt-8 bg-white border-base-300 rounded-lg border p-6 shadow-md">
            <div class="text-center pb-6">
                <img class="mx-auto" src="./assets/github-logo.png" alt="">

                <h1 class="font-semibold text-[24px] mt-4">GitHub Issues Tracker</h1>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <fieldset class="fieldset ">
                <label class="label font-medium text-neutral-950 ">Username</label>
                <input id="username" type="text" value="admin" class="input rounded-md w-full py-4"
                    placeholder="Enter Username" />
                <p class="text-[14px] text-[#4A00FF]">Default: admin</p>

                <label class="label font-medium text-neutral-950 pt-3">Password</label>
                <input id="password" type="password" class="input rounded-md w-full py-4" placeholder="Enter Password"
                    value="" />
                <p class="text-[14px] text-[#4A00FF]">Default: admin123</p>

                <button id="login-btn" onclick="login()"
                    class="btn text-white bg-[#4A00FF] mt-4 rounded-md tex-[20px] font-semibold">Sign
                    In</button>
            </fieldset>

            <div class="divider">OR</div>

            <p class="text-[#64748B] text-center">Demo Credentials:</p>

            <div class="bg-[#F8FAFC] py-6 rounded-md text-center mt-2">
                <p class="font-semibold"> Username: <span class="font-normal">admin</span></p>
                <p class="font-semibold"> Password: <span class="font-normal">admin123</span></p>
            </div>
        </div>
    </section>

    <!-- js  -->
    <script src="./js/login.js"></script>
</body>

</html>
