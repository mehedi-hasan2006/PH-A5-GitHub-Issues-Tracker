<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home || GitHub Issue Tracker </title>


    <!-- Tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- Font Awesome icon CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Geist  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- External CSS File  -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-[#F8FAFC] min-h-screen">

    <!-- Navabr  -->
    <nav class=" bg-white py-5 shadow-sm">
        <div class=" flex justify-between w-11/12 mx-auto">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" width="40px" alt="">
                <a class=" font-bold text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <div>
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues..." />
                    </label>
                </div>
                <div>
                    <button class="btn btn-primary">+ New Issue</button>
                </div>
            </div>
        </div>
    </nav>


    <section class="w-11/12 mx-auto mt-[30px] ">

        <!-- button section  -->
        <section class="bg-base-100 p-6 space-x-2 shadow-sm rounded-sm">
            <button class="btn btn-primary w-[120px]">All</button>
            <button class="btn  w-[120px] text-[#64748B]">Open</button>
            <button class="btn  w-[120px] text-[#64748B]">Closed</button>
        </section>


        <section class="bg-base-100 p-6 space-x-2 shadow-sm rounded-t-md mt-8">
            <!-- issues summary section -->
            <div class="flex justify-between">
                <div class="flex items-center gap-2">
                    <div class="bg-[#ECE4FF] p-2 rounded-full"><img src="./assets/Aperture.png" alt=""></div>
                    <div>
                        <h2 class="font-semibold text-[20px]"> 50 Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-[12px] h-[12px] bg-green-600 rounded-full"></div>
                    <p>Open</p>
                    <div class="w-[12px] h-[12px] bg-violet-600 rounded-full"></div>
                    <p>Closed</p>
                </div>
            </div>
        </section>


        <section class="bg-[#FBFBFB] border-t-2 border-gray-200">

            <!-- issues cards  -->

            <div class="p-6 grid grid-cols-1 lg:grid-cols-4 shadow-md rounded-b-md">
                <!-- cards display here from api -->
                 
                <div
                    class="bg-base-100 p-6 rounded-sm border-t-4 border-green-500 shadow-lg cursor-pointer transition-all duration-500 hover:scale-105">
                    <div class="flex justify-between">
                        <div>
                            <img src="./assets/Open-Status.png" alt="">
                        </div>
                        <div class="">
                            <p class="text-red-600  px-4 py-1 bg-red-100 rounded-full font-medium text-[12px]">HIGH</p>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <h2 class="font-semibold text-[14px]">Fix navigation menu on mobile devices</h2>
                        <p class="text-[#64748B] text-[12px]">The navigation menu doesn't collapse properly on mobile
                            devices...</p>
                        <div class="flex gap-2">
                            <div
                                class="flex gap-1 items-center px-2 py-1 bg-red-100 rounded-full font-medium text-[12px] border-red-200 border-2 text-red-600">
                                <i class="fa-solid fa-bug"></i>
                                <p>BUG</p>
                            </div>
                            <div
                                class="flex gap-1 items-center px-2 py-1 bg-yellow-100 rounded-full font-medium text-[12px] border-red-200 border-2 text-[#D97706]">
                                <i class="fa-regular fa-circle-stop"></i>
                                <p class="uppercase">help wanted</p>
                            </div>
                        </div>
                        <div class="divider "></div>
                        <div class="text-[#64748B]">
                            <p>#1 by john_doe </p>
                            <p> 1/15/2024</p>
                        </div>
                    </div>
                </div>

            </div>

        </section>
    </section>

</body>

</html>
